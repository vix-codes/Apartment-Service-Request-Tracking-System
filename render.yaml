services:
  - type: web
    name: url-shortener
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: url-shortener-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: url-shortener-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: url-shortener-postgres
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_CACHE_TYPE
        value: simple
      - key: APP_BASE_URL
        value: "https://url-shortener-iil9.onrender.com"
      - key: ALLOWED_ORIGINS
        value: "https://vixurlshort.vercel.app"

databases:
  - name: url-shortener-postgres
    databaseName: urlshortener
    user: url_user
    plan: free
