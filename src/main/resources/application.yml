server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:urlshortener;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  cache:
    type: simple

app:
  base-url: http://localhost:8080

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/urlshortener
    driverClassName: org.postgresql.Driver
    username: url_user
    password: url_password
  cache:
    type: redis
  data:
    redis:
      host: redis
      port: 6379
